<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏆 ЧС-2026 · Сітка плей-оф</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1020; --bg2:#121a30; --card:#161f3a; --card2:#1b2647;
    --line:#3b4a73; --txt:#e7ecf7; --dim:#8a96b8; --gold:#f4c64a;
    --green:#3fd07d; --red:#ff6b6b; --accent:#5b8cff; --conn:#4d5d8c; --cw:26px; --rh:42px;
  }
  *{box-sizing:border-box}
  html{margin:0}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--txt);
    background:radial-gradient(1100px 520px at 50% -8%,#19224a 0%,transparent 60%),var(--bg);}
  a{color:var(--accent)}
  header{position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);
    background:linear-gradient(180deg,rgba(11,16,32,.92),rgba(11,16,32,.7));
    border-bottom:1px solid #20294a;padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;letter-spacing:.3px}
  header .sub{color:var(--dim);font-size:12px}
  .spacer{flex:1}
  .tabs{display:flex;gap:6px;background:#0e1530;border:1px solid #20294a;border-radius:999px;padding:4px}
  .tabs button{all:unset;cursor:pointer;padding:7px 16px;border-radius:999px;font-size:13px;color:var(--dim);font-weight:600}
  .tabs button.active{background:var(--card2);color:var(--txt);box-shadow:0 1px 0 #2a3a66}
  .lang{display:flex;gap:2px;background:#0e1530;border:1px solid #20294a;border-radius:999px;padding:3px}
  .lang button{all:unset;cursor:pointer;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.3px}
  .lang button.on{background:var(--card2);color:var(--txt);box-shadow:0 1px 0 #2a3a66}
  .status{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(63,208,125,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,208,125,.5)}70%{box-shadow:0 0 0 7px rgba(63,208,125,0)}100%{box-shadow:0 0 0 0 rgba(63,208,125,0)}}

  .wrap{padding:22px}
  .view{display:none}
  .view.active{display:block}

  /* комірки використовують Roboto */
  .match, .final-card, .srow, .gcard table{font-family:'Roboto',-apple-system,BlinkMacSystemFont,sans-serif}

  /* ===== BRACKET (одностороннє дерево + підвкладки раундів, ESPN-стиль) ===== */
  .round-tabs{position:sticky;top:var(--hh,52px);z-index:20;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
    padding:8px 4px;margin:0 -4px;background:linear-gradient(180deg,var(--bg) 65%,transparent)}
  .round-tabs::-webkit-scrollbar{display:none}
  .round-tabs button{all:unset;cursor:pointer;flex:0 0 auto;padding:6px 16px;border-radius:999px;font-size:13px;
    font-weight:700;color:var(--dim);background:#0e1530;border:1px solid #20294a;white-space:nowrap}
  .round-tabs button.on{color:#0b1020;background:var(--gold);border-color:var(--gold)}

  .bracket{position:relative;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
  .rounds{display:flex;align-items:center;gap:36px;padding:10px 8px;min-width:max-content;position:relative}
  /* колонки однакової висоти + space-around → кожен матч наступного раунду стоїть рівно
     по центру між своїми двома фідерами, тож лінії пар не зливаються */
  .round-col{display:flex;flex-direction:column;justify-content:space-around;flex:0 0 auto}
  svg.conn{position:absolute;top:0;left:0;z-index:0;pointer-events:none}
  svg.conn path{fill:none;stroke:var(--conn);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}

  .match{position:relative;z-index:1;width:240px;background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid #28335c;border-radius:13px;overflow:hidden;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.28);transition:transform .12s,border-color .12s}
  .match:hover{transform:translateY(-1px);border-color:#41507f}
  .match .rowt,.final-card .rowt{display:flex;align-items:center;gap:10px;padding:0 0 0 14px;height:var(--rh);font-size:15px}
  .match .rowt+.rowt,.final-card .rowt+.rowt{border-top:1px solid #232f56}
  .match .flag,.final-card .flag{font-size:19px;width:24px;text-align:center;flex:0 0 auto}
  .match .nm,.final-card .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim);font-weight:600}
  .match .sc,.final-card .sc{width:40px;flex:0 0 auto;align-self:stretch;line-height:var(--rh);text-align:center;font-size:15px;
    border-left:1px solid #2a3658;color:#8893b5;font-weight:700;font-variant-numeric:tabular-nums}
  .sc .pen{font-size:10px;color:var(--gold);vertical-align:super;margin-left:1px}
  .nm.prov{color:#9aa6cc !important;font-weight:500}
  .match .rowt.win .nm,.final-card .rowt.win .nm{color:var(--txt)}
  .match .rowt.win .sc,.final-card .rowt.win .sc{color:var(--gold)}
  .match .rowt.win,.final-card .rowt.win{background:linear-gradient(90deg,rgba(244,198,74,.10),transparent)}
  .match .rowt.win::before,.final-card .rowt.win::before{content:"";position:absolute;left:0;width:3px;height:var(--rh);background:var(--gold)}
  .match .rowt.lose .nm,.match .rowt.lose .sc,.final-card .rowt.lose .nm,.final-card .rowt.lose .sc{opacity:.45}
  .match.tbd .nm{color:#566089}
  .match .meta,.final-card .meta{padding:5px 14px;font-size:11px;color:#6b76a0;background:#0f1733;display:flex;justify-content:space-between;gap:8px}
  .match.pub{border-color:#2f7d4f}
  .match.pub .meta,.meta.pub{color:var(--green);background:rgba(63,208,125,.12)}
  .match.live{border-color:var(--red)}
  .match.live .meta{color:var(--red)}
  .badge-live{color:#fff;background:var(--red);border-radius:4px;padding:0 5px;font-weight:700;font-size:9px;letter-spacing:.5px}

  /* фінальна колонка: кубок + чемпіон + фінал + матч за 3-тє місце */
  .final-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px}
  .cup-wrap{display:flex;flex-direction:column;align-items:center}
  .cup{width:74px;line-height:0;filter:drop-shadow(0 8px 22px rgba(244,198,74,.45));animation:float 4s ease-in-out infinite}
  .cup svg,.cup img{width:100%;height:auto;display:block}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .champ{min-height:0;text-align:center;font-weight:800;color:var(--gold);font-size:15px}
  .champ:not(:empty){margin-top:2px}
  .final-card{position:relative;width:248px;background:linear-gradient(180deg,#1c2950,#141d3a);border:1px solid var(--gold);
    border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(244,198,74,.18)}
  .final-card .ttl{text-align:center;font-size:12px;letter-spacing:2px;color:var(--gold);padding:7px;text-transform:uppercase;background:rgba(244,198,74,.08)}
  .third-card{border:1px dashed #344066;box-shadow:none;background:linear-gradient(180deg,var(--card),var(--card2))}
  .third-card .ttl{color:var(--dim);background:rgba(255,255,255,.03);letter-spacing:1px}

  /* ===== GROUPS ===== */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1300px;margin:0 auto}
  .gcard{background:var(--card);border:1px solid #28335c;border-radius:12px;overflow:hidden}
  .gcard h3{margin:0;padding:9px 12px;font-size:13px;background:#0f1733;border-bottom:1px solid #232f56}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:6px 8px;text-align:center}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase}
  td.team{text-align:left;white-space:nowrap}
  tr.q1 td,tr.q2 td{background:rgba(63,208,125,.07)}
  tr.q1 .pos,tr.q2 .pos{color:var(--green);font-weight:700}
  tr.q3 .pos{color:var(--gold);font-weight:700}
  td .pts{font-weight:700;color:var(--txt)}

  /* ===== SCHEDULE ===== */
  .sched{max-width:760px;margin:0 auto}
  .day-h{position:sticky;top:var(--hh,60px);scroll-margin-top:calc(var(--hh,60px) + 10px);background:linear-gradient(180deg,var(--bg),rgba(11,16,32,.85));
    padding:10px 4px 6px;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.5px;
    border-bottom:1px solid #232f56;margin-top:10px;text-transform:capitalize;backdrop-filter:blur(6px)}
  .day-h.focus{border-bottom:2px solid var(--gold);box-shadow:0 2px 0 rgba(244,198,74,.25)}
  .srow{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid #1b243f;border-radius:9px}
  .srow.pub{box-shadow:inset 3px 0 0 var(--green);background:linear-gradient(90deg,rgba(63,208,125,.07),transparent)}
  .srow.pub .time small{color:var(--green)}
  .srow.today{background:linear-gradient(90deg,rgba(255,107,107,.10),transparent);border:1px solid #4a2740}
  .srow.live{background:linear-gradient(90deg,rgba(255,107,107,.18),transparent);border:1px solid var(--red)}
  .srow.live .time{color:var(--red);font-size:13px;letter-spacing:.5px}
  .srow.live .time small{color:var(--red)}
  .srow.done{opacity:.6}
  .srow .time{font-variant-numeric:tabular-nums;font-weight:800;font-size:16px;min-width:54px;color:var(--txt)}
  .srow .time small{display:block;font-size:9px;font-weight:600;color:var(--dim);letter-spacing:1px}
  .srow .rnd{font-size:10px;color:var(--dim);min-width:46px;text-transform:uppercase;text-align:center}
  .srow .pair{flex:1;display:flex;flex-direction:column;gap:2px}
  .srow .tm{display:flex;align-items:center;gap:7px;font-size:14px}
  .srow .tm .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .tm .sc{flex:0 0 auto;width:22px;margin-left:8px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}
  .srow .tm.w .sc,.srow .tm.w .nm{color:var(--gold)}
  .srow .tm.l{opacity:.55}
  .srow .grd{font-size:10px;color:#5a648a;flex:0 0 150px;width:150px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .late{color:var(--red);font-size:9px;font-weight:700}

  .err{max-width:680px;margin:40px auto;background:#2a1730;border:1px solid #5a2842;border-radius:12px;padding:18px;color:#ffb3c7}
  .legend{display:flex;flex-wrap:wrap;gap:5px 11px;justify-content:center;align-items:center;color:var(--dim);font-size:11px;margin:14px 0 6px;line-height:1.5}
  .legend b{color:var(--gold)}
  .legend>span{white-space:nowrap}
  .legend .sep{color:#39426a;font-style:normal;user-select:none}
  footer{text-align:center;color:#5a648a;font-size:11px;padding:18px}
  .m-hint{display:none}

  /* ===== МОБІЛЬНІ (iPhone 12–17: портрет 375–440px) ===== */
  @media (max-width:600px){
    .rounds{gap:28px;padding:8px 6px}
    .round-tabs button{padding:7px 16px;font-size:13px}
    .wrap{padding:10px 6px;-webkit-overflow-scrolling:touch}
    .legend{font-size:10px;gap:4px 8px;margin:8px 0 4px;padding:0 6px}
    footer{font-size:10px;padding:12px}

    /* шапка компактніша, вкладки на всю ширину */
    header{padding:7px 10px;gap:5px 8px}
    header h1{font-size:13px;line-height:1.15}
    header .sub{display:none}
    header>span:first-child{font-size:17px}
    .spacer{display:none}
    .status{order:2;margin-left:auto;font-size:10px}
    .tabs{order:3;width:100%;padding:3px}
    .tabs button{flex:1;text-align:center;padding:7px 4px;font-size:11px}

    /* картка майже на весь екран + визирок наступного раунду (ESPN-стиль) */
    .match{width:min(82vw,360px)}
    .final-card{width:min(82vw,360px)}
    .cup{width:64px}

    /* розклад на всю ширину, без стадіону */
    .sched{max-width:100%}
    .day-h{font-size:12px;padding:9px 4px 5px}
    .srow{gap:8px;padding:9px 6px}
    .srow .grd{display:none}
    .srow .rnd{min-width:36px;font-size:9px}
    .srow .time{min-width:48px;font-size:15px}
    .srow .tm{font-size:13px}

    /* групи в одну колонку */
    .groups{grid-template-columns:1fr;gap:10px}
    th,td{padding:5px 6px}
  }

  /* ===== модалка матчу (деталі + «у календар») ===== */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,22,.72);backdrop-filter:blur(4px);padding:18px}
  .modal.show{display:flex}
  .modal-card{position:relative;width:min(420px,100%);max-height:86vh;overflow:auto;
    background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid #2a3a66;border-radius:16px;
    box-shadow:0 22px 60px rgba(0,0,0,.5);padding:22px 18px 18px}
  .modal-x{position:absolute;top:9px;right:11px;all:unset;cursor:pointer;font-size:23px;line-height:1;color:var(--dim);padding:5px}
  .modal-x:hover{color:var(--txt)}
  .m-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:2px 0 14px}
  .m-head .m-team{display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:800;text-align:center;font-size:15px}
  .m-head .m-team .fl{font-size:22px}
  .m-head .m-score{font-size:20px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap}
  .m-meta{display:flex;flex-wrap:wrap;gap:8px 12px;justify-content:center;color:var(--dim);font-size:12px;margin-bottom:14px}
  .m-meta .chip{background:#0e1530;border:1px solid #2a3a66;border-radius:999px;padding:2px 10px;color:var(--txt);font-weight:700}
  .m-goals{display:grid;grid-template-columns:1fr 1fr;gap:14px;border-top:1px solid #243057;padding-top:14px}
  .m-goals .gh{font-size:12px;font-weight:800;color:var(--dim);margin-bottom:6px}
  .m-goals ul{list-style:none;margin:0;padding:0;font-size:13px;line-height:1.7}
  .m-goals .none{color:#5a648a}
  .m-goals .pen{color:var(--dim);font-size:11px}
  .m-actions{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:9px}
  .cal-title{font-weight:800;font-size:13px;color:var(--dim)}
  .cal-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .cal-opt{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    background:#0e1530;border:1px solid #2a3a66;border-radius:11px;padding:9px 15px;
    font-size:13px;font-weight:700;color:var(--txt)}
  .cal-opt:hover{border-color:var(--gold);background:#141d3c}
  .cal-hint{color:#5a648a;font-size:11px;text-align:center;max-width:300px}
  .cal-note{color:var(--dim);font-size:12px}
</style>
</head>
<body>
<header>
  <span style="font-size:22px">🏆</span>
  <div>
    <h1 id="h1">Чемпіонат світу 2026 · USA / Canada / Mexico</h1>
    <div class="sub">Сітка плей-оф · оновлюється автоматично</div>
  </div>
  <div class="spacer"></div>
  <div class="tabs">
    <button id="tab-br" class="active" onclick="show('br')">🏆 Сітка</button>
    <button id="tab-sc" onclick="show('sc')">📅 Коли дивитись</button>
    <button id="tab-gr" onclick="show('gr')">📊 Групи</button>
  </div>
  <div class="lang" id="lang"></div>
  <div class="status"><span class="dot"></span><span id="upd">завантаження…</span></div>
</header>

<div class="wrap">
  <div id="view-br" class="view active">
    <div class="legend" id="leg-br"></div>
    <div id="round-tabs" class="round-tabs"></div>
    <div id="bracket" class="bracket"></div>
  </div>
  <div id="view-sc" class="view">
    <div class="legend" id="leg-sc"></div>
    <div id="sched" class="sched"></div>
  </div>
  <div id="view-gr" class="view">
    <div class="legend" id="leg-gr"></div>
    <div id="groups" class="groups"></div>
  </div>
</div>

<footer>Дані: openfootball (public domain) · оновлення щохвилини · зроблено для Football | WAWA ⚽</footer>

<script>
const SRC = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";

// ================= i18n: мова (авто з браузера + перемикач) і локальний час =================
const SUPPORTED = ["uk","en"];
const LOCALE   = { uk:"uk-UA", en:"en-GB" };
const LANGNAME = { uk:"UA", en:"EN" };
function detectLang(){
  try{ const s=localStorage.getItem("wc_lang"); if(s&&SUPPORTED.includes(s)) return s; }catch(e){}
  const navs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language||"en"];
  for(const l of navs){ const two=(l||"").slice(0,2).toLowerCase(); if(SUPPORTED.includes(two)) return two; }
  return "en";
}
let lang = detectLang();
// час користувача: його власний пояс (з фолбеком на Берлін)
let TZ = (()=>{ try{ return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Berlin"; }catch(e){ return "Europe/Berlin"; } })();
function locale(){ return LOCALE[lang] || "en-GB"; }
function tzLabel(dt){
  try{
    const p=new Intl.DateTimeFormat(locale(),{timeZone:TZ,timeZoneName:"short"}).formatToParts(dt||new Date());
    const z=p.find(x=>x.type==="timeZoneName"); return z? z.value : "";
  }catch(e){ return ""; }
}
const I18N = {
  uk:{
    title:"🏆 ЧС-2026 · Сітка плей-оф", h1:"Чемпіонат світу 2026",
    sub:"Сітка плей-оф · оновлюється автоматично",
    tabBracket:"🏆 Сітка", tabSchedule:"📅 Коли дивитись", tabGroups:"📊 Групи",
    loading:"завантаження…", updated:x=>"оновлено "+x, updateError:"помилка оновлення",
    legWinnerGold:"Переможець — <b>золотом</b>", legPub:"🍺 вечір (17:00–23:59) — зручно в паб",
    legDim:'<span style="color:#9aa6cc">приглушеним</span> — прогноз', legClick:"клік — голи",
    legTime:z=>`Час — <b>ваш пояс${z?` (${z})`:""}</b>`, legNight:"🌙 ніч", legToday:"🔴 сьогодні", legPlayed:"✅ зіграно",
    legGroups:"Групи 2026", legGreen:'<span style="color:var(--green)">зелені</span> — топ-2 (вихід)',
    legYellow:'<span style="color:var(--gold)">жовті</span> — 3-тє місце (частина виходить)',
    footer:"Дані: openfootball (public domain) · оновлення щохвилини · зроблено для Football | WAWA ⚽",
    final:"Фінал", thirdCard:"За 3-тє місце", roundThird:"3-тє м.", grPrefix:"Гр. ", groupWord:"Група ",
    extraTime:"дод. час", awaiting:"чекаємо рахунок", pens:(a,b)=>`пен. ${a}–${b}`, live:"LIVE", liveNow:"триває",
    winnerOf:"Переможець ", loserOf:"Переможений ",
    placeOrd:["","1-ше","2-ге","3-тє"], placeInGroup:(o,g)=>`${o} місце гр. ${g}`, thirdPool:l=>`3-тє місце (${l})`,
    groupsNA:"Дані по групах поки недоступні.", ongoing:"· триває",
    colTeam:"Команда", colP:"І", colW:"В", colD:"Н", colL:"П", colPts:"О",
    schedNA:"Розклад поки недоступний.", today:"· сьогодні 🔴", upcoming:"· найближчі ⏭", penaltiesFull:(a,b)=>`пенальті ${a}–${b}`,
    addCal:"🗓 Додати в календар", calHintAll:"Усі три одразу відкривають подію в календарі. ",
    dlIcs:"Завантажити .ics", timeTbd:"Час матчу ще уточнюється",

function orderedRound(set){
  const out=[];
  (function walk(n){
    const f=FEED[n];
    if(f){ walk(f[0]); if(set.has(n)) out.push(n); walk(f[1]); }

  })(FINAL);
  return out;
}

function flag(name){
  const cc = CC[name];
  if(!cc) return "🏳️";
  if(cc.includes("-")) return cc==="gb-eng"?"🏴\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}"
        : cc==="gb-sct"?"🏴\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}"
        : cc==="gb-wls"?"🏴\u{E0067}\u{E0062}\u{E0077}\u{E006C}\u{E0073}\u{E007F}":"🏳️";
  return cc.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0)));
}

// ---- state ----
let byNum = {};      // match num -> match
let allMatches = [];
let focusDayKey = "";  // день розкладу для авто-фокусу

function scorePair(m){
  if(!m || !m.score) return null;
  const s = m.score;
  return { ft:s.ft, et:s.et, p:s.p };
}
// returns 1 (team1 win), 2 (team2 win), 0 (draw/none/not played)
function winnerOf(m){
  const sp = scorePair(m);
  if(!sp) return 0;
  if(sp.p) return sp.p[0]>sp.p[1]?1:2;
  const base = sp.et || sp.ft;
  if(!base) return 0;
  if(base[0]>base[1]) return 1;
  if(base[1]>base[0]) return 2;
  return 0;
}
function isPlayed(m){ return !!scorePair(m); }

// рахунок по стороні матчу: {main, pen} або null (матч не зіграно → прочерк)
function sideScore(m, side){
  const sp = scorePair(m); if(!sp) return null;
  const b = sp.ft||sp.et||[];
  return { main: b[side-1], pen: sp.p? sp.p[side-1] : null };
}
function teamRow(name, sc, cls){
  const d = displayTeam(name);
  const main = sc ? sc.main : "–";
  const pen = (sc && sc.pen!=null) ? `<span class="pen">${sc.pen}</span>` : "";
  return `<div class="rowt ${cls}">
     <span class="flag">${d.fl}</span>
     <span class="nm ${d.prov?'prov':''}">${d.nm}</span>
     <span class="sc">${main}${pen}</span>
   </div>`;
}

// плашка картки: 🍺 дата · день тижня  ·····  час/статус (та сама для всіх карток)
function metaHtml(m){
  if(!m) return `<div class="meta"><span></span><span></span></div>`;
  const sp=scorePair(m), dt=cetDate(m.date,m.time), {live,pending}=liveInfo(m), pub=isPubTime(dt);
  let l = dt ? `${cetDateShort(dt)} · ${cetWeekday(dt)}` : (m.date?fmtDate(m.date):"");
  if(pub) l = "🍺 "+l;
  let r = "";
  if(sp&&sp.p) r = t().pens(sp.p[0],sp.p[1]);
  else if(sp&&sp.et) r = t().extraTime;
  else if(pending) r = t().awaiting;
  else if(!sp&&dt) r = cetTime(dt)+" "+tzLabel(dt);
  else if(!sp&&m.time) r = m.time.replace(/ UTC.*/,'');
  return `<div class="meta${pub?' pub':''}"><span>${live?'<span class="badge-live">LIVE</span> ':''}${l}</span><span>${r}</span></div>`;
}

// одна картка матчу (без вкладеності — колонки будуються окремо)
function matchCard(num){
  const m = byNum[num];
  let w=0, played=false, tbd=false;
  if(m){ played=isPlayed(m); w=winnerOf(m); tbd=!m.team1 && !m.team2; } else tbd=true;
  const c1 = played?(w===1?"win":w===2?"lose":""):"";
  const c2 = played?(w===2?"win":w===1?"lose":""):"";
  const dt = m? cetDate(m.date,m.time) : null;
  const live = m ? liveInfo(m).live : false;
  const pub = isPubTime(dt);
  const card = document.createElement("div");
  card.className = "match"+(tbd?" tbd":"")+(pub?" pub":"")+(live?" live":"");
  card.id = "m"+num;
  card.innerHTML = `
    ${teamRow(m?.team1, m?sideScore(m,1):null, c1)}
    ${teamRow(m?.team2, m?sideScore(m,2):null, c2)}
    ${metaHtml(m)}`;
  card.onclick = ()=>showGoals(m, num);
  return card;
}

// фінальна колонка: кубок + чемпіон + фінал + матч за 3-тє місце
function finalColumn(){
  const wrap = document.createElement("div"); wrap.className="final-wrap";
  const fm = byNum[FINAL], fw = winnerOf(fm);
  const champ = fw? (fw===1?fm.team1:fm.team2) : "";
  const cup = document.createElement("div"); cup.className="cup-wrap";
  cup.innerHTML = `<div class="cup">${CUP_SVG}</div><div class="champ">${champ? flag(champ)+" "+champ : ""}</div>`;
  const fc = document.createElement("div"); fc.className="final-card"; fc.id="m"+FINAL;
  fc.innerHTML = `<div class="ttl">${t().final}</div>${finalRows(fm)}${metaHtml(fm)}`;
  fc.onclick = ()=>showGoals(fm, FINAL);
  const tm = byNum[THIRD];
  const tc = document.createElement("div"); tc.className="final-card third-card"; tc.id="m"+THIRD;
  tc.innerHTML = `<div class="ttl">${t().thirdCard}</div>${finalRows(tm)}${metaHtml(tm)}`;
  if(tm) tc.onclick = ()=>showGoals(tm, THIRD);
  wrap.append(cup, fc, tc);
  return wrap;
}

// одностороння сітка: колонки-раунди зліва направо
function buildBracket(){
  const root = document.getElementById("bracket");
  root.innerHTML = "";
  const rounds = document.createElement("div"); rounds.className="rounds";
  ROUNDS.forEach(rd=>{
    const col = document.createElement("div"); col.className="round-col"; col.dataset.round=rd.key;
    if(rd.key==="final"){ col.classList.add("final-col"); col.appendChild(finalColumn()); }
    else rd.nums.forEach(n=> col.appendChild(matchCard(n)));
    rounds.appendChild(col);
  });
  root.appendChild(rounds);
  buildRoundTabs();
  requestAnimationFrame(()=>{ layoutBracket(); drawConnectors(); });
}

// ---- підвкладки раундів (ESPN-стиль): липкі, гортаються, фокус по тапу ----
function buildRoundTabs(){
  const bar = document.getElementById("round-tabs"); if(!bar) return;
  bar.innerHTML = "";
  ROUNDS.forEach(rd=>{
    const b = document.createElement("button"); b.dataset.round=rd.key; b.textContent=(rd.key==="final"?t().final:rd.label);
    b.onclick = ()=>gotoRound(rd.key);
    bar.appendChild(b);
  });
  setActiveTab(ROUNDS[0].key);
}
function setActiveTab(key){
  const bar = document.getElementById("round-tabs"); if(!bar) return;
  bar.querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.round===key));
  const btn = bar.querySelector(`button[data-round="${key}"]`);
  if(btn) btn.scrollIntoView({inline:"center", block:"nearest", behavior:"smooth"});
}
let tabLockUntil = 0;
function gotoRound(key){
  const br = document.getElementById("bracket");
  const col = br.querySelector(`.round-col[data-round="${key}"]`);
  if(col){
    br.scrollTo({left: col.offsetLeft - 10, behavior:"smooth"});           // по горизонталі — до колонки
    const card = col.querySelector(".match, .final-card");                 // по вертикалі — до матчів раунду
    if(card){
      const top = window.scrollY + card.getBoundingClientRect().top - 150;
      window.scrollTo({top: Math.max(0, top), behavior:"smooth"});
    }
  }
  tabLockUntil = Date.now() + 700;   // не давати прокрутці перебити активну вкладку
  setActiveTab(key);
}
function syncActiveTab(){
  if(Date.now() < tabLockUntil) return;
  const br = document.getElementById("bracket");
  const cols = [...br.querySelectorAll(".round-col")];
  if(!cols.length) return;
  // догорнули до кінця → активний останній раунд
  if(br.scrollLeft + br.clientWidth >= br.scrollWidth - 5){
    setActiveTab(cols[cols.length-1].dataset.round); return;
  }
  const x = br.scrollLeft + 30;
  let cur = cols[0];
  cols.forEach(c=>{ if(c.offsetLeft <= x) cur = c; });
  if(cur) setActiveTab(cur.dataset.round);
}

// ---- SVG-конектори (малюємо за реальними позиціями карток) ----
// вирівнювання дерева: усі колонки однакової висоти → space-around ставить кожен матч
// наступного раунду точно по центру між його двома фідерами (лінії пар не зливаються)
function layoutBracket(){
  const br = document.getElementById("bracket");
  const rounds = br && br.querySelector(".rounds");
  if(!rounds || br.offsetParent===null) return;
  const cols = [...rounds.querySelectorAll(".round-col")];
  const sample = rounds.querySelector(".match");
  if(!cols.length || !sample) return;
  const matchH = sample.getBoundingClientRect().height;
  const maxN = Math.max(...cols.map(c=>c.querySelectorAll(".match").length || 1));
  const gap = 18;
  const H = Math.round(maxN*(matchH+gap));
  cols.forEach(c=>{ c.style.height = H+"px"; });
}
function drawConnectors(){
  const br = document.getElementById("bracket");
  const rounds = br && br.querySelector(".rounds");
  if(!rounds || br.offsetParent===null) return;  // приховано — вимірювання невалідні
  let svg = rounds.querySelector("svg.conn");
  if(!svg){
    svg = document.createElementNS(SVGNS,"svg"); svg.setAttribute("class","conn");
    const p = document.createElementNS(SVGNS,"path"); svg.appendChild(p);
    rounds.insertBefore(svg, rounds.firstChild);
  }
  const W = rounds.scrollWidth, H = rounds.scrollHeight;
  svg.setAttribute("width",W); svg.setAttribute("height",H); svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const rr = rounds.getBoundingClientRect();
  const P = el=>{ const r=el.getBoundingClientRect(); return {l:r.left-rr.left, t:r.top-rr.top, w:r.width, h:r.height}; };
  let d = "";
  Object.keys(FEED).forEach(ns=>{
    const num=+ns, target=document.getElementById("m"+num);
    if(!target) return;
    const [a,b]=FEED[num], fa=document.getElementById("m"+a), fb=document.getElementById("m"+b);
    if(!fa||!fb) return;
    const T=P(target), A=P(fa), B=P(fb);
    const ax=A.l+A.w, ay=Math.round(A.t+A.h/2), bx=B.l+B.w, by=Math.round(B.t+B.h/2);
    const tx=T.l, ty=Math.round(T.t+T.h/2);
    const midX=Math.round(Math.min((ax+tx)/2,(bx+tx)/2));
    // обидва фідери йдуть до вертикалі midX, опускаються/піднімаються до рівня цілі й зливаються
    d += `M${ax} ${ay}H${midX}V${ty}H${tx}M${bx} ${by}H${midX}V${ty}`;
  });
  svg.firstChild.setAttribute("d", d);
}
function finalRows(m){
  if(!m) return teamRow("",null,"")+teamRow("",null,"");

// ---- календарна подія для матчу (спільні дані для Google / Outlook / .ics) ----
function pad2(n){ return String(n).padStart(2,"0"); }
function icsStamp(d){ return d.getUTCFullYear()+pad2(d.getUTCMonth()+1)+pad2(d.getUTCDate())
  +"T"+pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+pad2(d.getUTCSeconds())+"Z"; }
function icsEsc(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;"); }
function calEvent(m){                                    // -> {start,end,title,desc,loc} | null
  const dt=cetDate(m.date,m.time); if(!dt) return null;
  const t1=displayTeam(m.team1).nm, t2=displayTeam(m.team2).nm, rl=roundLabel(m), sp=scorePair(m);
  return {
    start:dt, end:new Date(dt.getTime()+120*60000),     // матч ≈ 2 год
    title:t().evTitle(t1,t2,rl),
    desc:[
      t().descMatch(t1,t2),
      rl?t().descRound(rl):"",
      t().descWatch(cetDayLabel(dt), cetTime(dt), tzLabel(dt)),
      sp?t().descResult((sp.ft||sp.et)[0],(sp.ft||sp.et)[1]):"",
      t().descBracket
    ].filter(Boolean).join("\n"),
    loc:m.ground||""
  };
}
// Google Календар — одразу відкриває заповнену подію (без завантаження файлу)
function googleCalUrl(m){
  const e=calEvent(m); if(!e) return "#";
  const p=new URLSearchParams({action:"TEMPLATE", text:e.title,
    dates:icsStamp(e.start)+"/"+icsStamp(e.end), details:e.desc, location:e.loc});
  return "https://calendar.google.com/calendar/render?"+p.toString();
}
// Outlook Web — так само відкриває форму нової події
function outlookCalUrl(m){
  const e=calEvent(m); if(!e) return "#";
  const p=new URLSearchParams({path:"/calendar/action/compose", rru:"addevent",
    subject:e.title, startdt:e.start.toISOString(), enddt:e.end.toISOString(),
    body:e.desc, location:e.loc});
  return "https://outlook.live.com/calendar/0/deeplink/compose?"+p.toString();
}
// Apple — webcal:// на наш ендпоінт /event.ics (Calendar сам відкриє подію, без файлу)
function appleWebcalUrl(m){
  const e=calEvent(m); if(!e) return "#";
  const p=new URLSearchParams({title:e.title, start:icsStamp(e.start), end:icsStamp(e.end),
    desc:e.desc, loc:e.loc, uid:"m"+(m.num||"")});
  return "webcal://"+location.host+"/event.ics?"+p.toString();
}
// запасний варіант — завантажити .ics файл (Blob), якщо webcal чомусь не спрацював
function addToCalendar(m, num){
  const e=calEvent(m); if(!e) return;
  const ics=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//WAWA//WorldCup2026//UK","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT",
    "UID:wc2026-m"+num+"-"+e.start.getTime()+"@wawa-worldcup",
    "DTSTAMP:"+icsStamp(new Date()),
    "DTSTART:"+icsStamp(e.start),
    "DTEND:"+icsStamp(e.end),
    "SUMMARY:"+icsEsc(e.title),
    "DESCRIPTION:"+icsEsc(e.desc),
    e.loc?"LOCATION:"+icsEsc(e.loc):"",
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(e.title),"TRIGGER:-PT30M","END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].filter(Boolean).join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="wc2026-match"+num+".ics";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1500);
}

// ---- groups: compute standings (global) ----
let standings = {};   // "Group A" -> {rows:[...sorted], done:bool}
function computeStandings(){
  const groups={};
  allMatches.forEach(m=>{
    if(!m.group) return;
    const g=groups[m.group]||(groups[m.group]={});
    [m.team1,m.team2].forEach(t=>{ if(t&&!g[t]) g[t]={t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}; });
    const sp=m.score&&m.score.ft; if(!sp) return;
    const a=g[m.team1], b=g[m.team2]; if(!a||!b) return;
    a.P++;b.P++; a.GF+=sp[0];a.GA+=sp[1]; b.GF+=sp[1];b.GA+=sp[0];
    if(sp[0]>sp[1]){a.W++;b.L++;a.Pts+=3;}
    else if(sp[0]<sp[1]){b.W++;a.L++;b.Pts+=3;}
    else {a.D++;b.D++;a.Pts++;b.Pts++;}
  });
  const out={};
  Object.keys(groups).forEach(g=>{
    const rows=Object.values(groups[g]).sort((x,y)=>
      y.Pts-x.Pts || (y.GF-y.GA)-(x.GF-x.GA) || y.GF-x.GF || x.t.localeCompare(y.t));
    out[g]={rows, done: rows.length>=4 && rows.every(r=>r.P>=3)};
  });
  return out;
}

// ---- resolve slot codes (1G / 2K / 3C / 3A/B/.. / W73 / L101) -> human / real team ----
function displayTeam(raw){
  if(!raw || !raw.trim()) return {nm:"—", fl:"·", prov:false};
  let mt;
  // winner / loser of a match number
  if(mt=raw.match(/^([WL])(\d+)$/)){
    const isW=mt[1]==="W", ref=byNum[+mt[2]], num=+mt[2];
    if(ref){ const w=winnerOf(ref); if(w){ const nm=((isW?w===1:w===2))?ref.team1:ref.team2; return displayTeam(nm); } }
    const rnd = num>=103?"1/2" : num>=101?"1/2" : num>=97?"1/4" : num>=89?"1/8" : "1/16";
    return {nm:(isW?t().winnerOf:t().loserOf)+rnd, fl:isW?"➡️":"↩️", prov:true};
  }
  // single group position 1A / 2K / 3C
  if(mt=raw.match(/^([123])([A-L])$/)){
    const pos=+mt[1], gname="Group "+mt[2], st=standings[gname];
    if(st && st.rows[pos-1]) return {...displayTeam(st.rows[pos-1].t), prov:!st.done};
    return {nm:t().placeInGroup(t().placeOrd[pos], mt[2]), fl:["","🥇","🥈","🥉"][pos], prov:true};
  }
  // third-place pool 3A/B/C/D/F
  if(/^3[A-L](\/[A-L])+$/.test(raw))
    return {nm:t().thirdPool(raw.slice(1)), fl:"🥉", prov:true};
  // real team name
  return {nm:raw, fl:flag(raw), prov:false};
}

// ---- schedule (chronological, CET) ----
function buildSchedule(){
  const wrap=document.getElementById("sched"); wrap.innerHTML="";
  const items = allMatches
    .map(m=>({m, dt:cetDate(m.date,m.time)}))
    .filter(x=>x.dt)
    .sort((a,b)=>a.dt-b.dt);
  if(!items.length){ wrap.innerHTML=`<div class='err'>${t().schedNA}</div>`; return; }

  // день для авто-фокусу: перший матч, який ще попереду або триває (старт за останні 3 год).
  // якщо сьогодні вже відіграно — це буде найближчий майбутній день.
  const cutoff = Date.now() - 3*3600*1000;
  const focus = items.find(x => x.dt.getTime() >= cutoff) || items[items.length-1];
  focusDayKey = cetDayKey(focus.dt);

  let curDay="";
  items.forEach(({m,dt})=>{
    const dk=cetDayKey(dt);
    if(dk!==curDay){
      curDay=dk;
      const h=document.createElement("div"); h.className="day-h";
      if(dk===focusDayKey){ h.id="focus-day"; h.classList.add("focus"); }
      h.textContent=cetDayLabel(dt)+(cetIsToday(dt)?"  "+t().today:(dk===focusDayKey?"  "+t().upcoming:""));
      wrap.appendChild(h);
    }
    const sp=scorePair(m), played=!!sp, w=winnerOf(m);
    const b = sp?(sp.ft||sp.et):[];
    const today=cetIsToday(dt), late=cetIsLate(dt), pub=isPubTime(dt);
    const {live, pending}=liveInfo(m);
    const tmRow=(name,score,side)=>{
      const cls=played?(w===side?"w":(w?"l":"")):"";
      const d=displayTeam(name);
      return `<div class="tm ${cls}"><span class="flag">${d.fl}</span>
        <span class="nm ${d.prov?'prov':''}">${d.nm}</span><span class="sc">${played?score:""}</span></div>`;
    };
    const row=document.createElement("div");
    row.className="srow"+(pub?" pub":"")+(live?" live":"")+(today&&!played&&!live?" today":"")+(played?" done":"");
    row.onclick=()=>showGoals(m, m.num);
    const timeMain = played?"✅" : live?t().live : cetTime(dt);
    const timeSub  = played?fmtDate(m.date) : live?t().liveNow : pending?t().awaiting : (pub?"🍺 ":"")+tzLabel(dt)+(late?" 🌙":"");
    row.innerHTML=`
      <div class="time">${timeMain}<small>${timeSub}</small></div>
      <div class="rnd">${roundLabel(m)}</div>
      <div class="pair">
        ${tmRow(m.team1, b[0], 1)}
        ${tmRow(m.team2, b[1], 2)}
        ${sp&&sp.p?`<div class="late">${t().penaltiesFull(sp.p[0],sp.p[1])}</div>`:""}
      </div>
      <div class="grd">${m.ground||""}</div>`;
    wrap.appendChild(row);
  });
}

// ---- helpers ----
function fmtDate(d){ if(!d) return ""; const [y,mo,da]=d.split("-"); return `${da}.${mo}`; }

// ---- час у поясі та мові користувача (TZ і locale() визначені в блоці i18n вгорі) ----
// назви лишились cet* історично, але тепер це локальний час користувача
function cetDate(date, time){           // -> JS Date (моментальний UTC), або null
  if(!date || !time) return null;
  const mt = time.match(/(\d{1,2}):(\d{2})\s*UTC([+-]\d{1,2})/);
  if(!mt) return null;
  const hh=+mt[1], mm=+mt[2], off=+mt[3];
  return new Date(Date.UTC(+date.slice(0,4), +date.slice(5,7)-1, +date.slice(8,10), hh-off, mm));
}
function cetTime(dt){ return dt? dt.toLocaleTimeString(locale(),{timeZone:TZ,hour:"2-digit",minute:"2-digit"}) : ""; }
function cetDayKey(dt){ return dt? dt.toLocaleDateString("sv-SE",{timeZone:TZ}) : ""; }  // YYYY-MM-DD (стабільний ключ дня)
function cetDayLabel(dt){ return dt? dt.toLocaleDateString(locale(),{timeZone:TZ,weekday:"long",day:"2-digit",month:"long"}) : ""; }
function cetDateShort(dt){ return dt? dt.toLocaleDateString(locale(),{timeZone:TZ,day:"2-digit",month:"2-digit"}) : ""; }
function cetWeekday(dt){ if(!dt) return ""; const s=dt.toLocaleDateString(locale(),{timeZone:TZ,weekday:"long"}); return s.charAt(0).toUpperCase()+s.slice(1); }
function cetIsToday(dt){ return dt && cetDayKey(dt)===cetDayKey(new Date()); }
function cetHour(dt){ return dt? +dt.toLocaleTimeString("en-GB",{timeZone:TZ,hour:"2-digit",hour12:false}).slice(0,2) : -1; }
function cetIsLate(dt){ const h=cetHour(dt); return h>=0 && h<6; }            // глибока ніч 🌙
function isPubTime(dt){ const h=cetHour(dt); return h>=17 && h<=23; }          // зручно сходити в паб 🍺 (17:00–23:59)

// реальний статус за часом: live лише у вікні матчу (~2,5 год), далі без рахунку = «чекаємо рахунок»
const MATCH_MS = 150*60000;
function liveInfo(m){
  if(!m || isPlayed(m)) return {live:false, pending:false};
  const dt=cetDate(m.date, m.time);
  if(!dt) return {live:false, pending:false};
  const now=Date.now(), start=dt.getTime();
  return { live: now>=start && now<start+MATCH_MS, pending: now>=start+MATCH_MS };
}

const ROUND = {
 "Round of 32":"1/16","Round of 16":"1/8","Quarter-final":"1/4","Quarterfinal":"1/4",
 "Semi-final":"1/2","Semifinal":"1/2"
};
function roundLabel(m){
  if(!m) return "";
  if(m.group) return m.group.replace("Group ", t().grPrefix);
  if(m.round==="Final") return t().final;
  if(m.round==="Match for third place") return t().roundThird;
  return ROUND[m.round] || m.round || "";
}

function show(v){
  ["br","sc","gr"].forEach(k=>{
    document.getElementById("view-"+k).classList.toggle("active",v===k);
    document.getElementById("tab-"+k).classList.toggle("active",v===k);
  });
  if(v==="sc") scrollToFocus();
  if(v==="br") requestAnimationFrame(()=>{ layoutBracket(); drawConnectors(); });  // перемалювати після показу
}
function scrollToFocus(){
  // чекаємо, поки вкладка стане видимою (display:block), потім прокручуємо до актуального дня
  requestAnimationFrame(()=>{
    const el=document.getElementById("focus-day");
    if(el) el.scrollIntoView({block:"start", behavior:"auto"});
  });
}

async function load(){
  try{
    const r = await fetch(SRC + "?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    allMatches = data.matches||[];
    byNum = {};
    allMatches.forEach(m=>{ if(m.num!=null) byNum[m.num]=m; });
    standings = computeStandings();
    buildBracket();
    buildSchedule();
    buildGroups();
    const now=new Date();
    document.getElementById("upd").textContent =
      t().updated(now.toLocaleTimeString(locale(),{hour:"2-digit",minute:"2-digit"}));
  }catch(e){
    document.getElementById("upd").textContent = t().updateError;
    if(!Object.keys(byNum).length){
      document.getElementById("bracket").innerHTML = t().loadErr(e.message);
    }
  }
}

  const lb=document.getElementById("leg-br"); if(lb) lb.innerHTML=[
    `<span>${T.legWinnerGold}</span>`, `<span style="color:var(--green)">${T.legPub}</span>`,
    `<span>${T.legDim}</span>`, `<span>${T.legClick}</span>`].join(sep);
  const ls=document.getElementById("leg-sc"); if(ls) ls.innerHTML=[
    `<span>${T.legTime(tzLabel())}</span>`, `<span style="color:var(--green)">${T.legPub}</span>`,
    `<span>${T.legNight}</span>`, `<span>${T.legToday}</span>`, `<span>${T.legPlayed}</span>`].join(sep);
  const lg=document.getElementById("leg-gr"); if(lg) lg.innerHTML=[
    `<span>${T.legGroups}</span>`, `<span>${T.legGreen}</span>`, `<span>${T.legYellow}</span>`].join(sep);
  const ft=document.querySelector("footer"); if(ft) ft.textContent=T.footer;
  const upd=document.getElementById("upd"); if(upd && !allMatches.length) upd.textContent=T.loading;
  buildLangSwitch();
  setHeaderH();
}
function buildLangSwitch(){
  const box=document.getElementById("lang"); if(!box) return;
  box.innerHTML="";
  SUPPORTED.forEach(l=>{
    const b=document.createElement("button"); b.textContent=LANGNAME[l];
    if(l===lang) b.className="on";
    b.onclick=()=>setLang(l);
    box.appendChild(b);
  });
}
function setLang(l){
  if(!SUPPORTED.includes(l) || l===lang) return;
  lang=l; try{ localStorage.setItem("wc_lang", l); }catch(e){}
  applyStatic();
  // перемалювати динамічні вкладки з наявними даними
  buildBracket(); buildSchedule(); buildGroups();
}
// висота шапки → змінна для липких відступів (підвкладки, заголовки днів)
function setHeaderH(){
  const h=document.querySelector("header");
  if(h) document.documentElement.style.setProperty("--hh", h.offsetHeight+"px");
}

// синхронізація активної підвкладки при прокрутці сітки + перемалювання конекторів
(function(){
  setHeaderH();
  const br=document.getElementById("bracket");
  let raf=0;
  br.addEventListener("scroll", ()=>{ if(raf)cancelAnimationFrame(raf); raf=requestAnimationFrame(syncActiveTab); }, {passive:true});
  let rt=0;
  window.addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ setHeaderH(); layoutBracket(); drawConnectors(); },150); });
  window.addEventListener("load", setHeaderH);
})();

applyStatic();      // мова з браузера (або збережена) + написи
load();
setInterval(load, 60000);
</script>
</body>
